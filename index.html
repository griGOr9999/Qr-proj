<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Mask Analyzer v5.0</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        h2 { margin-top: 0; font-size: 0.9rem; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 12px; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 8px; }

        #gen-canvas { width: 100%; max-width: 300px; display: block; margin: 15px auto; border: 10px solid white; border-radius: 4px; background: white; }

        .file-wrapper { position: relative; overflow: hidden; margin-bottom: 10px; }
        .file-label { display: block; padding: 25px; border: 2px dashed #444; border-radius: 12px; cursor: pointer; color: #aaa; text-align: center; background: #1a1a1a; }
        #file-input { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; }

        .res-row { display: flex; justify-content: space-between; margin-top: 8px; background: #0b0b0b; padding: 12px; border-radius: 8px; border: 1px solid #222; }
        .val { font-weight: bold; color: var(--accent); }
        .decoded-box { margin-top: 10px; background: #000; padding: 12px; border-radius: 8px; border: 1px solid #333; min-height: 40px; word-break: break-all; color: #00ff88; font-family: monospace; font-size: 0.9rem; }

        .swatch-box { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .swatch { width: 30px; height: 30px; border-radius: 6px; border: 2px solid white; }

        .c-R { background: #dc0000; } .c-G { background: #008200; } .c-B { background: #0000c8; } .c-W { background: #5a2d0a; }

        .map-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        .map-table th, .map-table td { border: 1px solid #333; padding: 6px; text-align: center; }
        #preview-img { width: 100%; border-radius: 12px; display: none; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>1. Генератор QR</h2>
        <input type="text" id="text-in" value="Привет мир, это тестовое сообщение">
        <select id="mask-select">
            <option value="0">Маска №0: R-G-B-W</option>
            <option value="1">Маска №1: R-G-W-B</option>
            <option value="2">Маска №2: R-B-G-W</option>
            <option value="3">Маска №3: R-B-W-G</option>
            <option value="4">Маска №4: R-W-G-B</option>
            <option value="5">Маска №5: R-W-B-G</option>
            <option value="6">Маска №6: G-R-B-W</option>
            <option value="7">Маска №7: G-R-W-B</option>
        </select>
        <button id="gen-btn">Сгенерировать QR</button>
        <button id="analyze-generated-btn">Анализировать сгенерированный QR</button>
        <canvas id="gen-canvas"></canvas>
    </div>

    <div class="card">
        <h2>2. Анализатор QR</h2>
        <div class="file-wrapper">
            <label class="file-label">Загрузить QR-код</label>
            <input type="file" id="file-input" accept="image/*">
        </div>
        <img id="preview-img" alt="preview">
        <div class="res-row"><span>Системная маска:</span><span id="out-sys" class="val">--</span></div>
        <div class="res-row"><span>Цветовая маска:</span><span id="out-color" class="val">--</span></div>
        <div id="out-text" class="decoded-box">Ожидание...</div>
        <div id="scan-swatches" class="swatch-box"></div>
    </div>

    <div class="card">
        <h2>Таблица соответствия масок</h2>
        <table class="map-table">
            <thead>
                <tr><th>№</th><th>Цвета (ЛВ-ПВ-ПН-ЛН)</th><th>Код</th></tr>
            </thead>
            <tbody id="mask-map-body"></tbody>
        </table>
    </div>
</div>

<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
    const MASTER_CONFIG = {
        0: { seq: 'RGBW', colors: ['R', 'G', 'B', 'W'] },
        1: { seq: 'RGWB', colors: ['R', 'G', 'W', 'B'] },
        2: { seq: 'RBGW', colors: ['R', 'B', 'G', 'W'] },
        3: { seq: 'RBWG', colors: ['R', 'B', 'W', 'G'] },
        4: { seq: 'RWGB', colors: ['R', 'W', 'G', 'B'] },
        5: { seq: 'RWBG', colors: ['R', 'W', 'B', 'G'] },
        6: { seq: 'GRBW', colors: ['G', 'R', 'B', 'W'] },
        7: { seq: 'GRWB', colors: ['G', 'R', 'W', 'B'] }
    };

    const PALETTE = {
        R: { rgb: [220, 0, 0] },
        G: { rgb: [0, 130, 0] },
        B: { rgb: [0, 0, 200] },
        W: { rgb: [90, 45, 10] }
    };

    let codeReader = null;
    let lastGeneratedMask = 0;

    function getResultText(result) {
        if (result && typeof result.getText === 'function') return result.getText();
        return result ? result.text : null;
    }

    function getResultPoints(result) {
        if (result && typeof result.getResultPoints === 'function') return result.getResultPoints();
        return result ? result.resultPoints : null;
    }

    function pointXY(pt) {
        if (!pt) return null;
        if (typeof pt.getX === 'function' && typeof pt.getY === 'function') return { x: pt.getX(), y: pt.getY() };
        if (typeof pt.x === 'number' && typeof pt.y === 'number') return { x: pt.x, y: pt.y };
        return null;
    }

    function normalizePoints(rawPoints) {
        if (!rawPoints || rawPoints.length < 3) return [];
        const pts = [];
        for (let i = 0; i < rawPoints.length; i++) {
            const p = pointXY(rawPoints[i]);
            if (p) pts.push(p);
        }
        return pts;
    }

    function resetOutputs(message) {
        document.getElementById('out-text').innerText = message || '--';
        document.getElementById('out-sys').innerText = '--';
        document.getElementById('out-color').innerText = '--';
        document.getElementById('scan-swatches').innerHTML = '';
    }

    window.onload = function() {
        try {
            codeReader = new ZXing.BrowserQRCodeReader();
            drawTable();
            generateQR();
            document.getElementById('gen-btn').addEventListener('click', generateQR);
            document.getElementById('file-input').addEventListener('change', handleFile);
            document.getElementById('analyze-generated-btn').addEventListener('click', analyzeGenerated);
        } catch (e) {
            resetOutputs('Ошибка инициализации');
        }
    };

    async function generateQR() {
        const text = document.getElementById('text-in').value;
        const maskId = parseInt(document.getElementById('mask-select').value, 10);
        const canvas = document.getElementById('gen-canvas');
        const ctx = canvas.getContext('2d');

        if (typeof QRCode === 'undefined') return;

        const validMaskId = Math.min(Math.max(0, maskId), 7);
        lastGeneratedMask = validMaskId;

        const qrModel = QRCode.create(text, {
            errorCorrectionLevel: 'H',
            maskPattern: validMaskId,
            margin: 1
        });

        const size = qrModel.modules.size;
        const scale = Math.floor(600 / size);
        const drawSize = size * scale;
        const offset = Math.floor((600 - drawSize) / 2);

        canvas.width = 600;
        canvas.height = 600;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, 600, 600);

        const data = qrModel.modules.data;
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                const isDark = data[y * size + x];
                if (isDark) {
                    ctx.fillStyle = 'black';
                    ctx.fillRect(offset + x * scale, offset + y * scale, scale, scale);
                }
            }
        }

        const config = MASTER_CONFIG[validMaskId];
        const imgData = ctx.getImageData(0, 0, 600, 600);
        const pixels = imgData.data;

        for (let i = 0; i < pixels.length; i += 4) {
            if (pixels[i] < 128) {
                const x = (i / 4) % 600;
                const y = Math.floor((i / 4) / 600);
                let key;
                if (x < 300 && y < 300) key = config.colors[0];
                else if (x >= 300 && y < 300) key = config.colors[1];
                else if (x >= 300 && y >= 300) key = config.colors[2];
                else key = config.colors[3];
                const rgb = PALETTE[key].rgb;
                pixels[i] = rgb[0];
                pixels[i + 1] = rgb[1];
                pixels[i + 2] = rgb[2];
            }
        }
        ctx.putImageData(imgData, 0, 0);
    }

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        resetOutputs('Анализ...');

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = document.getElementById('preview-img');
            img.src = event.target.result;
            img.style.display = 'block';
            img.onload = function() { processImage(img); };
        };
        reader.readAsDataURL(file);
    }

    function buildCanvasFromImage(imgEl) {
        const hc = document.getElementById('hidden-canvas');
        const hctx = hc.getContext('2d', { willReadFrequently: true });
        hc.width = imgEl.naturalWidth || imgEl.width;
        hc.height = imgEl.naturalHeight || imgEl.height;
        hctx.drawImage(imgEl, 0, 0);
        return { hc, hctx };
    }

    async function processImage(imgEl) {
        const built = buildCanvasFromImage(imgEl);
        const hc = built.hc;
        const hctx = built.hctx;

        let text = '--';
        let systemMask = '--';
        let pts = [];

        try {
            // Try to decode using ZXing which can provide mask information
            const result = await codeReader.decodeFromImageElement(imgEl);
            text = getResultText(result) || '--';
            pts = normalizePoints(getResultPoints(result) || []);

            // Try to get mask pattern from ZXing result if available
            if (result && result.getFormatInformation) {
                try {
                    const formatInfo = result.getFormatInformation();
                    if (formatInfo) {
                        systemMask = formatInfo.getMaskPattern();
                    }
                } catch (e) {
                    // Fallback to color detection if mask pattern not available
                    systemMask = '--';
                }
            }
        } catch (err) {
            // Fallback to jsQR if ZXing fails
            const fallback = fallbackDecodeJsQR(hctx, hc);
            if (fallback) {
                text = fallback.text;
                pts = fallback.points;
            }
        }

        if (pts.length < 3 && text === '--') {
            resetOutputs('QR не найден');
            return;
        }

        document.getElementById('out-text').innerText = text;

        // For generated QR codes, use the known mask
        const isGeneratedQR = imgEl.src.startsWith('data:image/png;base64');
        if (isGeneratedQR) {
            systemMask = lastGeneratedMask;
        }

        // Detect color mask
        const colorMask = detectColors(hctx, hc, pts);

        document.getElementById('out-sys').innerText = systemMask !== '--' ? String(systemMask) : '--';
        document.getElementById('out-color').innerText = colorMask !== '--' ? colorMask : '--';
    }

    function fallbackDecodeJsQR(hctx, canvas) {
        if (typeof jsQR === 'undefined') return null;

        const raw = hctx.getImageData(0, 0, canvas.width, canvas.height);
        let qr = jsQR(raw.data, canvas.width, canvas.height, { inversionAttempts: 'attemptBoth' });
        if (!qr) {
            const bw = preprocessHighContrast(hctx, canvas);
            qr = jsQR(bw, canvas.width, canvas.height, { inversionAttempts: 'attemptBoth' });
        }
        if (!qr) return null;

        const loc = qr.location || {};
        const points = [pointXY(loc.bottomLeftCorner), pointXY(loc.topLeftCorner), pointXY(loc.topRightCorner)];
        if (!points[0] || !points[1] || !points[2]) return null;

        return { text: qr.data || '--', points };
    }

    function preprocessHighContrast(hctx, canvas) {
        const src = hctx.getImageData(0, 0, canvas.width, canvas.height);
        const dst = new Uint8ClampedArray(src.data.length);
        for (let i = 0; i < src.data.length; i += 4) {
            const lum = src.data[i] * 0.299 + src.data[i + 1] * 0.587 + src.data[i + 2] * 0.114;
            const v = lum > 140 ? 255 : 0;
            dst[i] = v; dst[i + 1] = v; dst[i + 2] = v; dst[i + 3] = 255;
        }
        return dst;
    }

    async function analyzeGenerated() {
        const canvas = document.getElementById('gen-canvas');
        if (!canvas.width || !canvas.height) await generateQR();
        const img = new Image();
        img.onload = function() { processImage(img); };
        img.src = canvas.toDataURL('image/png');
        const preview = document.getElementById('preview-img');
        preview.src = img.src;
        preview.style.display = 'block';
    }

    function detectColors(hctx, canvas, pts) {
        if (!pts || pts.length < 3 || !pts[0] || !pts[1] || !pts[2]) {
            return '--';
        }

        const tl = pts[1], tr = pts[2], bl = pts[0];
        const vx = { x: tr.x - tl.x, y: tr.y - tl.y };
        const vy = { x: bl.x - tl.x, y: bl.y - tl.y };
        const samples = [{ u: 0.25, v: 0.25 }, { u: 0.75, v: 0.25 }, { u: 0.75, v: 0.75 }, { u: 0.25, v: 0.75 }];

        let seq = '';

        for (let i = 0; i < samples.length; i++) {
            const s = samples[i];
            const x = tl.x + vx.x * s.u + vy.x * s.v;
            const y = tl.y + vx.y * s.u + vy.y * s.v;
            const sx = Math.max(2, Math.min(canvas.width - 3, Math.round(x)));
            const sy = Math.max(2, Math.min(canvas.height - 3, Math.round(y)));
            const data = hctx.getImageData(sx - 2, sy - 2, 5, 5).data;

            let r = 0, g = 0, b = 0, c = 0;
            for (let j = 0; j < data.length; j += 4) {
                const rr = data[j], gg = data[j + 1], bb = data[j + 2];
                const lum = (rr + gg + bb) / 3;
                if (lum > 25 && lum < 240) {
                    r += rr; g += gg; b += bb; c++;
                }
            }
            if (!c) c = 1;

            const avg = { r: r / c, g: g / c, b: b / c };
            let best = 'W', minD = Infinity;
            for (const key in PALETTE) {
                const t = PALETTE[key].rgb;
                const d = Math.sqrt((avg.r - t[0]) ** 2 + (avg.g - t[1]) ** 2 + (avg.b - t[2]) ** 2);
                if (d < minD) { minD = d; best = key; }
            }

            seq += best;
        }

        let resId = '--';
        for (const id in MASTER_CONFIG) {
            if (MASTER_CONFIG[id].seq === seq) {
                resId = id;
                break;
            }
        }
        return String(resId);
    }

    function drawTable() {
        document.getElementById('mask-map-body').innerHTML = Object.entries(MASTER_CONFIG).map(function(entry) {
            const id = entry[0], cfg = entry[1];
            return `
                <tr>
                    <td><b>${id}</b></td>
                    <td><div style="display:flex; gap:3px; justify-content:center;">
                        ${cfg.colors.map(function(c) { return `<div class="swatch c-${c}" style="width:14px; height:14px; border:1px solid #fff"></div>`; }).join('')}
                    </div></td>
                    <td>${cfg.seq}</td>
                </tr>
            `;
        }).join('');
    }
</script>

</body>
</html>
